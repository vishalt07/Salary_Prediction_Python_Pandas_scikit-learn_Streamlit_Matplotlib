<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - SynerHealth AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e8f5e8 0%, #f0fdf4 50%, #dcfce7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .result-container {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 800px;
            width: 100%;
        }
        .detection-icon {
            font-size: 4rem;
            color: #f59e0b;
            margin-bottom: 20px;
        }
        .result-title {
            color: #065f46;
            font-size: 2rem;
            margin-bottom: 25px;
            font-weight: 700;
        }
        
        /* Image and accuracy section with proper alignment */
        .image-accuracy-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin: 25px 0;
        }
        
        .uploaded-image {
            max-width: 300px;
            width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease;
        }
        
        .uploaded-image:hover {
            transform: scale(1.02);
        }
        
        .accuracy-badge {
            display: inline-flex;
            align-items: center;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 1rem;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        
        .disease-info {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border: 2px solid #f59e0b;
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
            text-align: left;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.1);
        }
        
        .disease-info h3 {
            color: #92400e;
            margin-bottom: 15px;
            font-weight: 600;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .disease-info p {
            color: #92400e;
            line-height: 1.7;
            font-size: 1.1rem;
            margin: 0;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 35px;
        }
        
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        
        .btn-secondary {
            background: white;
            color: #10b981;
            border: 2px solid #10b981;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.1);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }
        
        .btn-secondary:hover {
            background: #f0fdf4;
        }
        
        /* Responsive design */
        @media (max-width: 640px) {
            .result-container {
                padding: 25px;
                margin: 10px;
            }
            
            .result-title {
                font-size: 1.6rem;
            }
            
            .uploaded-image {
                max-width: 250px;
            }
            
            .action-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 250px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="result-container">
        <div class="detection-icon">
            <i class="fas fa-microscope"></i>
        </div>
        <h1 class="result-title">Disease Detection Result</h1>

        <div class="image-accuracy-section">
            {% if image_url %}
                <img src="{{ image_url }}" alt="Uploaded Leaf" class="uploaded-image">
            {% endif %}
            
            <div class="accuracy-badge">
                <i class="fas fa-chart-line"></i>
                97.93% Accuracy
            </div>
        </div>
        
        <div class="disease-info">
            <h3>
                <i class="fas fa-clipboard-check"></i>
                Analysis Result:
            </h3>
            <p>{{ prediction | safe }}</p>
        </div>
        
        <div class="action-buttons">
            <a href="/disease-detect" class="btn btn-secondary">
                <i class="fas fa-upload"></i>
                Upload Another Image
            </a>
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i>
                Back to Home
            </a>
        </div>
    </div>
</body>
</html>
