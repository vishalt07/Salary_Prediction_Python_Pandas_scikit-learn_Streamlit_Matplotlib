
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - SynerHealth AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e8f5e8 0%, #f0fdf4 50%, #dcfce7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .result-container {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        .success-icon {
            font-size: 4rem;
            color: #10b981;
            margin-bottom: 20px;
        }
        .result-title {
            color: #065f46;
            font-size: 2rem;
            margin-bottom: 15px;
            font-weight: 700;
        }
        .result-crop {
            color: #10b981;
            font-size: 2.5rem;
            font-weight: 800;
            margin: 20px 0;
            text-transform: capitalize;
        }
        .result-message {
            color: #6b7280;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }
        .btn-secondary {
            background: white;
            color: #10b981;
            border: 2px solid #10b981;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body>
    <div class="result-container">
        <div class="success-icon">
            <i class="fas fa-seedling"></i>
        </div>
        <h1 class="result-title">Recommended Crop</h1>
        <div class="result-crop">{{ prediction }}</div>
        <p class="result-message">
            Based on your soil conditions and climate data, <strong>{{ prediction }}</strong> is the most suitable crop for your farm. 
            This recommendation is made with 97.93% accuracy using our advanced machine learning model.
        </p>
        <div class="action-buttons">
            <a href="/crop-recommend" class="btn btn-secondary">
                <i class="fas fa-redo"></i>
                Try Again
            </a>
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i>
                Back to Home
            </a>
        </div>
    </div>
</body>
</html>
